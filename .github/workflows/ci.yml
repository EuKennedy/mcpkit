name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: typecheck
        run: npx tsc --noEmit

      - name: lint
        run: npm run lint

      - name: test
        run: npm test

      - name: build
        run: npm run build

      - name: scaffold a project end-to-end
        shell: bash
        run: |
          node ./dist/cli.js create /tmp/e2e-stdio -t stdio-basic --no-install -y
          node ./dist/cli.js create /tmp/e2e-http -t http-streaming --no-install -y
          node ./dist/cli.js create /tmp/e2e-fetch -t with-fetch --no-install -y
          node ./dist/cli.js create /tmp/e2e-sqlite -t with-sqlite --no-install -y
          test -f /tmp/e2e-stdio/src/index.ts
          test -f /tmp/e2e-http/src/index.ts
          test -f /tmp/e2e-fetch/src/index.ts
          test -f /tmp/e2e-sqlite/src/index.ts
          test -f /tmp/e2e-sqlite/src/db.ts
          test -f /tmp/e2e-stdio/.gitignore
          grep -q '"name": "e2e-stdio"' /tmp/e2e-stdio/package.json

      - name: verify npm tarball contents
        if: matrix.node == 22 && runner.os == 'Linux'
        shell: bash
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack.txt
          # every starter must ship its renamed gitignore so scaffolded
          # projects don't end up tracking node_modules/dist
          for t in stdio-basic http-streaming with-fetch with-sqlite; do
            grep -q "templates/$t/_gitignore" /tmp/pack.txt
          done
          # the dist must be there or the bin won't resolve
          grep -q "dist/cli.js" /tmp/pack.txt
          grep -q "dist/index.js" /tmp/pack.txt
          grep -q "dist/testing.js" /tmp/pack.txt
